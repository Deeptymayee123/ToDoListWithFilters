<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo list with filter</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h2><i class="fa-solid fa-circle-check"></i>MyTask</h2>
        <span id="date"></span>
      </header>

      <div class="todoInput">
        <input type="text" id="todoTask" />
        <button id="add"><i class="fa-solid fa-plus"></i></button>
      </div>
      <!-- all three types of filters -->
      <div class="filters">
        <div class="filter" data-filter="All">All</div>
        <div class="filter" data-filter="Active">Active</div>
        <div class="filter" data-filter="Completed">Completed</div>
      </div>
      <!-- All task will be added here -->
      <div class="taskContainer">
        <ul class="allTask">
          <li class="item">
            <div class="questionContainer">
              <input type="checkbox" class="task" />
              <span class="checkMark">Buy milk</span>
            </div>
            <button type="button" id="deleteBtn">
              <i class="fa-solid fa-x"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
    <script src="./script.js"></script>
    <script
      src="https://kit.fontawesome.com/ae8dfe5513.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
